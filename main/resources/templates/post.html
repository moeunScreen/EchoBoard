<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .header {
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between; /* 양쪽 끝으로 */
            align-items: center;
        }

        .header-bottom {
            margin-top: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .home-link {
            text-decoration: none;
            color: #555;
            font-size: 14px;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .write-btn {
            padding: 8px 14px;
            background-color: #333;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        .write-btn:hover {
            background-color: #111;
        }

        .search-bar {
            display: flex;
            justify-content: flex-end; /* 오른쪽 정렬 */
            padding: 10px 20px;
            background-color: #f5f5f5; /* 원하면 배경색 */
        }

        .search-bar form {
            display: flex;
            align-items: center;
        }

        .search-bar input {
            padding: 5px 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-bar button {
            padding: 5px 10px;
            margin-left: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background-color: #6c757d;
            color: white;
            border-radius: 4px;
        }

        .search-bar button:hover {
            background-color: #5a6268
        }


        .container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
        }

        .top-posts {
            background: #fff3cd;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom:  20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .top-posts h2 {
            margin-top: 0;
            color: #d48806;
            font-size: 16px;
        }

        .top-post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .top-post-list li {
            display: flex;
            align-items: center;
            padding: 6px 4px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
        }

        .top-post-list li:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: 600;          /* bold → 살짝만 */
            width: 22px;               /* 30 → 22 */
            font-size: 0.85rem;        /* 랭크 축소 */
            color: #fa541c;
        }

        .title {
            flex: 1;
            font-weight: 500;
            font-size: 0.9rem;         /* 제목 축소 */
            white-space: nowrap;       /* 한 줄 유지 */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .views {
            font-size: 0.7rem;         /* 0.75 → 0.7 */
            color: #888;
            margin-left: 8px;          /* auto → 간격만 */
        }

        h1 {
            color: #4a4a4a;
            margin-bottom: 30px;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-list li {
            background: #fff;
            padding: 10px 6px;
            margin: 0;
            border-bottom: 1px solid #eaeaea;
            border-radius: 0;
            box-shadow: none;
            text-align: left;
            cursor: pointer;
        }
        .post-list li:hover {
            background-color: #f9f9f9;
            transform: none;
        }

        .post-list li h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .post-list li p {
            margin-top: 4px;
            font-size: 0.8rem;
            color: #888;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }

        .pagination a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .pagination a:hover {
            text-decoration: underline;
        }

        .page-info {
            color: #666;
        }
        .search-result {
            width: 100%;
            padding: 20px;
        }

        .search-results {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 왼쪽과 오른쪽 배치 */
            margin-bottom: 20px; /* 아래 요소와 20px 간격 */

        }

        .posts-link {
            text-decoration: none; /* 밑줄 제거 */
            color: #000;           /* 검정색 또는 원하는 색 */
            font-weight: bold;
            font-size: 16px;
        }

        .search-results h2 {
            margin: 0 auto;         /* 가운데 정렬 */
            text-align: center;
            flex: 1;                /* 공간 차지해서 가운데 유지 */
            font-size: 18px;
        }

    </style>
</head>
<body>
<div class="container">
    <h1>게시판</h1>
    <div class="header">
        <div class="header-top">
            <a href="/" class="home-link">← 홈으로</a>
            <a href="/posts/new" class="write-btn">글쓰기</a>
        </div>
        <hr>
        <div class="top-posts">
            <h2>🔥 인기 게시글 TOP 5</h2>
            <ul class="top-post-list">
                <li th:each="post, stat : ${topPosts}"
                    th:onclick="|location.href='/posts/${post.id}'|">
                    <span class="rank" th:text="${stat.index + 1}">1</span>
                    <span class="title" th:text="${post.title}">제목</span>
                    <span class="views">
                조회수 <span th:text="${post.viewCount}">0</span>
            </span>
                </li>
            </ul>
        </div>
        <!-- 검색창 추가 -->
        <div class="search-bar">
            <form th:action="@{/posts/search}" method="GET">
                <input type="text" name="query" placeholder="검색어를 입력하세요" required>
                <button type="submit">검색</button>
            </form>
        </div>

        <div class="search-results" th:if="${query != null}">
            <a href="/posts" class="posts-link">← 게시판</a>
            <h2>🔍 검색 결과: <span th:text="${query}">검색어</span></h2>
        </div>
    <ul class="post-list">
        <li th:each="post : ${posts}"
            th:onclick="|location.href='/posts/${post.id}'|">

            <h3 th:text="${post.title}">게시글 제목</h3>

            <p>
                작성자:
                <span th:text="${post.author}">user</span>
                |
                작성일:
                <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">
                2026-02-04</span>
                | 조회수: <span th:text="${post.viewCount}">0</span>
            </p>

        </li>
    </ul>
        <div class="pagination">
            <a th:if="${page.hasPrevious()}"
               th:href="@{/posts(page=${page.number - 1})}">
                이전
            </a>

            <span class="page-info">
        <span th:text="${page.number + 1}"></span>
        /
        <span th:text="${page.totalPages}"></span>
    </span>

            <a th:if="${page.hasNext()}"
               th:href="@{/posts(page=${page.number + 1})}">
                다음
            </a>
        </div>
</div>
</div>
</body>
</html>
